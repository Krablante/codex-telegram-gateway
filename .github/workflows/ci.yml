name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run automated test suite
        run: npm test -- --test-concurrency=1 --test-reporter=dot

      - name: Build guidebook smoke artifact
        run: npm run guidebook:build -- --language eng --output "${RUNNER_TEMP}/guidebook-eng.pdf"

      - name: Build runbook smoke artifact
        run: npm run runbook:build -- --language eng --output "${RUNNER_TEMP}/runbook-eng.pdf"

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies through native wrapper
        shell: cmd
        run: scripts\windows\install.cmd

      - name: Run automated test suite through native wrapper
        shell: cmd
        run: scripts\windows\test.cmd
